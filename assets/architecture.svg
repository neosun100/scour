<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 640" font-family="'Segoe UI',system-ui,sans-serif" role="img" aria-label="Scour architecture">
  <defs>
    <linearGradient id="abg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1f33"/><stop offset="100%" stop-color="#0a2f44"/>
    </linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#7dd3fc"/>
    </marker>
  </defs>
  <rect width="1160" height="640" rx="20" fill="url(#abg)"/>

  <!-- lane headers -->
  <text x="160" y="48" fill="#7dd3fc" font-size="20" font-weight="700" text-anchor="middle">Clients</text>
  <text x="600" y="48" fill="#5eead4" font-size="20" font-weight="700" text-anchor="middle">Scour  (your wrapper)</text>
  <text x="985" y="48" fill="#fbbf24" font-size="20" font-weight="700" text-anchor="middle">AWS · us-east-1</text>

  <!-- CLIENT cards -->
  <g>
    <rect x="40" y="90"  width="240" height="92" rx="12" fill="#0e3a52" stroke="#38bdf8" stroke-width="2"/>
    <text x="160" y="125" fill="#e2e8f0" font-size="17" font-weight="600" text-anchor="middle">CLI</text>
    <text x="160" y="152" fill="#94a3b8" font-size="14" text-anchor="middle">scour "query"</text>

    <rect x="40" y="262" width="240" height="106" rx="12" fill="#0e3a52" stroke="#38bdf8" stroke-width="2"/>
    <text x="160" y="297" fill="#e2e8f0" font-size="17" font-weight="600" text-anchor="middle">Agents (MCP)</text>
    <text x="160" y="323" fill="#94a3b8" font-size="13" text-anchor="middle">Claude Code · Codex</text>
    <text x="160" y="343" fill="#94a3b8" font-size="13" text-anchor="middle">Strands · LangGraph …</text>

    <rect x="40" y="448" width="240" height="106" rx="12" fill="#0e3a52" stroke="#38bdf8" stroke-width="2"/>
    <text x="160" y="483" fill="#e2e8f0" font-size="17" font-weight="600" text-anchor="middle">Apps / plugins</text>
    <text x="160" y="509" fill="#94a3b8" font-size="13" text-anchor="middle">"custom search" (HTTP)</text>
    <text x="160" y="529" fill="#94a3b8" font-size="13" text-anchor="middle">no AWS creds needed</text>
  </g>

  <!-- SCOUR container -->
  <rect x="360" y="74" width="380" height="496" rx="16" fill="#0c2c3e" stroke="#2dd4bf" stroke-width="2.5"/>
  <text x="550" y="104" fill="#5eead4" font-size="14" text-anchor="middle">rate-limit · concurrency cap · URL de-dup</text>

  <rect x="386" y="124" width="328" height="74" rx="10" fill="#103a4e" stroke="#5eead4" stroke-width="1.5"/>
  <text x="550" y="153" fill="#e2e8f0" font-size="16" font-weight="600" text-anchor="middle">scour  ·  scour-http  (REST /search)</text>
  <text x="550" y="178" fill="#94a3b8" font-size="13" text-anchor="middle">API-key auth (Bearer / X-API-Key)</text>

  <rect x="386" y="214" width="328" height="142" rx="10" fill="#103a4e" stroke="#5eead4" stroke-width="1.5"/>
  <text x="550" y="241" fill="#e2e8f0" font-size="16" font-weight="600" text-anchor="middle">scour-mcp  (MCP server)</text>
  <text x="550" y="268" fill="#bae6fd" font-size="13.5" text-anchor="middle">web_search · web_search_batch</text>
  <text x="550" y="290" fill="#bae6fd" font-size="13.5" text-anchor="middle">fetch_articles · research</text>
  <text x="550" y="326" fill="#94a3b8" font-size="12.5" text-anchor="middle">stdio (local creds) · streamable-HTTP (API key)</text>

  <rect x="386" y="372" width="328" height="86" rx="10" fill="#11324a" stroke="#fca5a5" stroke-width="1.4"/>
  <text x="550" y="400" fill="#fecaca" font-size="14.5" font-weight="600" text-anchor="middle">full-text fetch (research / fetch_articles)</text>
  <text x="550" y="424" fill="#fca5a5" font-size="12.5" text-anchor="middle">origin sites · robots-aware · host network</text>
  <text x="550" y="444" fill="#fca5a5" font-size="12.5" text-anchor="middle">(not AWS — your machine fetches the pages)</text>

  <!-- AWS lane -->
  <rect x="820" y="150" width="300" height="96" rx="12" fill="#13334a" stroke="#fbbf24" stroke-width="2"/>
  <text x="970" y="184" fill="#fde68a" font-size="16" font-weight="700" text-anchor="middle">AgentCore Gateway</text>
  <text x="970" y="210" fill="#cbd5e1" font-size="13" text-anchor="middle">MCP · AWS_IAM (SigV4) inbound</text>
  <text x="970" y="230" fill="#94a3b8" font-size="12.5" text-anchor="middle">assumes service role →</text>

  <rect x="820" y="318" width="300" height="96" rx="12" fill="#13334a" stroke="#fbbf24" stroke-width="2"/>
  <text x="970" y="352" fill="#fde68a" font-size="16" font-weight="700" text-anchor="middle">Web Search (managed)</text>
  <text x="970" y="378" fill="#cbd5e1" font-size="13" text-anchor="middle">Amazon web index · snippets</text>
  <text x="970" y="398" fill="#86efac" font-size="12.5" text-anchor="middle">100% inside AWS · zero egress</text>

  <!-- arrows: clients -> scour -->
  <g stroke="#7dd3fc" stroke-width="2.2" fill="none" marker-end="url(#arr)">
    <path d="M280,136 C320,140 330,150 358,156"/>
    <path d="M280,315 C320,300 330,290 358,280"/>
    <path d="M280,501 C320,470 330,300 358,300"/>
    <!-- scour -> gateway -->
    <path d="M740,200 C780,200 790,198 818,198"/>
    <!-- gateway -> web search -->
    <path d="M970,246 L970,316"/>
  </g>
  <text x="650" y="612" fill="#64748b" font-size="13" text-anchor="middle">Clients → Scour: local creds (CLI/stdio) or API key (HTTP).  Scour → Gateway: SigV4/IAM.  Gateway → Web Search: InvokeWebSearch, in-AWS.</text>
</svg>
