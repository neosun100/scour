<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Scour logo">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a2540"/>
      <stop offset="55%" style="stop-color:#0e4f73"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f7ff"/>
      <stop offset="100%" style="stop-color:#7dd3fc"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- ambient glow -->
  <circle cx="150" cy="140" r="150" fill="#38bdf8" opacity="0.12"/>

  <!-- magnifying glass: lens + handle (the "scour" / search) -->
  <g stroke="url(#ring)" stroke-width="22" fill="none" stroke-linecap="round">
    <circle cx="214" cy="214" r="120"/>
    <line x1="305" y1="305" x2="392" y2="392"/>
  </g>

  <!-- inside the lens: concurrent fan-out of results converging (the parallel search) -->
  <g stroke="#bae6fd" stroke-width="6" opacity="0.85">
    <line x1="214" y1="214" x2="150" y2="158"/>
    <line x1="214" y1="214" x2="284" y2="160"/>
    <line x1="214" y1="214" x2="150" y2="266"/>
    <line x1="214" y1="214" x2="286" y2="262"/>
  </g>
  <g fill="#ffffff">
    <circle cx="214" cy="214" r="20"/>
    <circle cx="150" cy="158" r="13"/>
    <circle cx="284" cy="160" r="13"/>
    <circle cx="150" cy="266" r="13"/>
    <circle cx="286" cy="262" r="13"/>
  </g>
</svg>
