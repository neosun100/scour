name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      # uv keeps everything in an isolated venv — no global/env conflicts.
      - name: Create env and install project + test deps
        run: |
          uv venv
          uv pip install . pytest

      - name: Run unit tests (offline — no AWS/network)
        run: uv run pytest -q
