name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      # setup-uv (with python-version) already creates .venv and sets VIRTUAL_ENV,
      # so install straight into it — no `uv venv` (it would error "already exists").
      - name: Install project + test deps
        run: uv pip install . pytest

      - name: Run unit tests (offline — no AWS/network)
        run: .venv/bin/pytest -q
